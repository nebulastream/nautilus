name: Benchmark
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# cancel previous runs of same PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  benchmark:
    name: Run tracing benchmark
    runs-on: ubuntu-24.04
    env:
      # clang >= 19 so the tbc copy-and-patch JIT benchmarks
      # (exec_tbc_*_{interp,jit}) are runnable; they are skipped on builds
      # that cannot execute stitched code (preserve_none needs Clang 19+).
      CC: clang-22
      CXX: clang++-22
    steps:
      - uses: actions/checkout@v4
      - name: Force apt to use IPv4
        run: echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
      - name: get cmake
        uses: lukka/get-cmake@latest
      - name: Install clang from LLVM apt repo
        run: |
          UBUNTU_CODENAME=$(lsb_release -cs)
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/${UBUNTU_CODENAME}/ llvm-toolchain-${UBUNTU_CODENAME}-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y clang-22 clang++-22
      - name: Install ccache (with retry)
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y ccache && exit 0
            echo "apt-get install ccache failed (attempt $i/5), retrying in 15s..."
            sleep 15
          done
          exit 1
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: ${{ github.job }}-ubuntu-24.04-clang-22-benchmark
      - name: cmake
        shell: bash
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache -DENABLE_BENCHMARKS=ON -DENABLE_LOGGING=OFF -G Ninja -S .
      - name: build
        shell: bash
        run: |
          cmake --build . --target all
      - name: test
        shell: bash
        run: |
          ./nautilus/test/benchmark/nautilus-benchmarks | tee benchmark_result.txt
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1.20.7
        with:
          name: Tracing Benchmark
          tool: 'catch2'
          output-file-path: benchmark_result.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-always: true
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh-pages-branch: 'pages'
          max-items-in-chart: 200
